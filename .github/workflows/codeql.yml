name: "CodeQL Security & Quality"

on:
  push:
  pull_request:

jobs:
  # ── 1. Django-specific security linting ─────────────────────────────────────
  django-security:
    name: Django Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      # pip-audit come from pyproject.toml dev dependencies
      - name: Install dependencies
        run: |
          poetry install --no-interaction --with dev

      # pip-audit: checks installed packages against OSV, PyPI Advisory DB
      # --local audits packages installed in Poetry's virtualenv (no requirements.txt needed)
      - name: Run pip-audit (dependency CVEs)
        run: |
          poetry run pip-audit \
            --local \
            --format cyclonedx-json \
            --output pip-audit-results.json
        continue-on-error: true

      # Django's own system check framework — catches misconfigurations
      - name: Run Django system checks
        env:
          DJANGO_SETTINGS_MODULE: ${{ vars.DJANGO_SETTINGS_MODULE || 'governanceplatform.settings' }}
          SECRET_KEY: "ci-insecure-placeholder-key-not-used-in-production"
          DEBUG: "False"
          DJANGO_CI: "True"
          DJANGO_SILENCED_SYSTEM_CHECKS: "security.W008,security.W012,security.W016,staticfiles.W004"
        run: poetry run python manage.py check --deploy --fail-level ERROR

  # ── 2. CodeQL analysis (Python + JavaScript) ────────────────────────────────
  codeql:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ "python", "javascript" ]
        # Remove 'javascript' if you have no JS/TS frontend in this repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended: broader taint-tracking (XSS, SSRF, SQLi sources/sinks)
          # security-and-quality: adds code quality rules on top
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - "*/migrations/*"
              - "*/tests/*"
              - ".venv/**"
              - "venv/**"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  # ── 3. Code quality ──────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      # ruff, mypy, django-stubs all come from pyproject.toml dev dependencies
      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      # Ruff exclusions ([tool.ruff] exclude = ["migrations"]) live in pyproject.toml
      - name: Run Ruff (lint)
        run: poetry run ruff check . --output-format=github

      - name: Run Ruff (format check)
        run: poetry run ruff format --check .

      # mypy config ([tool.mypy] + [tool.django-stubs]) lives in pyproject.toml
      - name: Run mypy
        run: poetry run mypy .
        continue-on-error: true  # promote to hard failure once type coverage improves

  # ── 4. Dependency review (PRs only) ─────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Blocks PRs that introduce dependencies with known CVEs
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
