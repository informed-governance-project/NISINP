name: "CodeQL Security & Quality"

on:
  push:
  pull_request:

jobs:
  # ── 1. Django-specific security linting ─────────────────────────────────────
  django-security:
    name: Django Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install --no-interaction
          poetry run pip install bandit[toml] pip-audit

      # Bandit: AST-based Python security linter
      - name: Run Bandit (SAST)
        run: |
          poetry run bandit -r . \
            --exclude ./.venv,./venv,./env,./node_modules,./migrations \
            --severity-level medium \
            --confidence-level medium \
            -f sarif \
            -o bandit-results.sarif
        continue-on-error: true

      - name: Upload Bandit results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      # pip-audit: checks installed packages against OSV, PyPI Advisory DB
      # --local audits the packages actually installed in Poetry's virtualenv,
      # avoiding the need for a requirements.txt export
      - name: Run pip-audit (dependency CVEs)
        run: |
          poetry run pip-audit \
            --local \
            --format cyclonedx-json \
            --output pip-audit-results.json
        continue-on-error: true

      # Django's own system check framework — catches misconfigurations
      - name: Run Django system checks
        env:
          DJANGO_SETTINGS_MODULE: ${{ vars.DJANGO_SETTINGS_MODULE || 'config.settings.ci' }}
          SECRET_KEY: "ci-insecure-placeholder-key-not-used-in-production"
          DEBUG: "False"
        run: |
          poetry run python manage.py check --deploy --fail-level WARNING
        continue-on-error: true

  # ── 2. CodeQL analysis (JS/TS + Python) ─────────────────────────────────────
  codeql:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ "python", "javascript" ]
        # Remove 'javascript' if you have no JS/TS frontend in this repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality adds code-quality rules on top of security ones
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - "*/migrations/*"
              - "*/tests/*"
              - ".venv/**"
              - "venv/**"


      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  # ── 3. Code quality ──────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install --no-interaction
          poetry run pip install ruff mypy django-stubs

      # Ruff: extremely fast linter + formatter (replaces flake8, isort, pyupgrade)
      - name: Run Ruff (lint)
        run: poetry run ruff check . --output-format=github

      - name: Run Ruff (format check)
        run: poetry run ruff format --check .

      # mypy: static type checking
      - name: Run mypy
        run: |
          poetry run mypy . \
            --ignore-missing-imports \
            --exclude '(migrations|venv|\.venv)' \
            --django-settings-module="${{ vars.DJANGO_SETTINGS_MODULE || 'config.settings.ci' }}"
        continue-on-error: true  # promote to hard failure once type coverage improves

  # ── 4. Dependency review (PRs only) ─────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Blocks PRs that introduce dependencies with known CVEs
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
