ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12  # keep in sync with ruff version in pyproject.toml
    hooks:
      - id: ruff
        args: [--fix, --output-format=full]
      - id: ruff-format

  # ── Django-specific upgrade fixer ───────────────────────────────────────────
  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.29.0
    hooks:
      - id: django-upgrade
        args: [--target-version, "6.0"]

  # ── Format code blocks inside documentation ──────────────────────────────────
  - repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        additional_dependencies: [black]

  # ── General file hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: fix-byte-order-marker
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key

  # ── Dependency export (keeps docs/requirements-app.txt in sync) ──────────────
  - repo: https://github.com/python-poetry/poetry-plugin-export
    rev: 1.9.0
    hooks:
      - id: poetry-export
        args: ["-f", "requirements.txt", "-o", "docs/requirements-app.txt", "--without-hashes"]

  # ── Dependency CVE audit (runs against the exported requirements) ─────────────
  - repo: https://github.com/pypa/pip-audit
    rev: v2.9.0
    hooks:
      - id: pip-audit
        args: ["-r", "docs/requirements-app.txt"]
