[pytest]
DJANGO_SETTINGS_MODULE = governanceplatform.settings
python_files = tests.py test_*.py *_tests.py
addopts = --create-db --cov=governanceplatform --cov=incidents --cov-report=term-missing
markers =
    django_db: marks tests as using the django database
; testpaths = governanceplatform
; pythonpath = governanceplatform
